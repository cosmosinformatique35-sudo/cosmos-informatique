<section class="section-padding" id="boutique">
    <h2>Nos Catégories</h2>
    <div class="underline"></div>
    
    <div class="shop-grid" id="categories-grid">
        <div class="product-card" onclick="afficherCategorie('informatique')">
            <div class="product-img"><i class="fas fa-laptop"></i></div>
            <h3>Informatique</h3>
            <span class="btn-buy">Voir les articles</span>
        </div>
        <div class="product-card" onclick="afficherCategorie('reseaux')">
            <div class="product-img"><i class="fas fa-network-wired"></i></div>
            <h3>Réseaux</h3>
            <span class="btn-buy">Voir les articles</span>
        </div>
        <div class="product-card" onclick="afficherCategorie('smartphones')">
            <div class="product-img"><i class="fas fa-mobile-alt"></i></div>
            <h3>Smartphone & Tablette</h3>
            <span class="btn-buy">Voir les articles</span>
        </div>
    </div>

    <div id="produits-liste" style="display:none; margin-top:40px;">
        <button onclick="retourCategories()" class="btn" style="margin-bottom:20px;">← Retour aux catégories</button>
        <div class="shop-grid" id="liste-items">
            </div>
    </div>
</section>

<script>
// Petite fonction magique pour gérer l'affichage
function afficherCategorie(cat) {
    document.getElementById('categories-grid').style.display = 'none';
    document.getElementById('produits-liste').style.display = 'block';
    
    // Ici, le code chargera automatiquement tes articles depuis produits.json
    console.log("Chargement de la catégorie : " + cat);
    // Note : Pour un fonctionnement complet, il faudra charger le JSON avec 'fetch'
}

function retourCategories() {
    document.getElementById('categories-grid').style.display = 'grid';
    document.getElementById('produits-liste').style.display = 'none';
}
</script>
